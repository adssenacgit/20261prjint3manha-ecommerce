services:
  mysql:
    image: mysql:5.7
    container_name: mysql-prjint3
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: 20261_prjint3_manha_gabrielsilva
    ports:
      - "3306:3306"
    command: --character-set-server=latin1 --collation-server=latin1_swedish_ci
    volumes:
      - mysql_data:/var/lib/mysql
volumes:
  mysql_data:
