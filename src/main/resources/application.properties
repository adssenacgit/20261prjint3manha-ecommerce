# Para ambiente acadêmico/desenvolvimento.
# O update permite que o Hibernate crie as duas colunas de status que faltavam no SQL original:
# endereco_status e item_pedido_status.
# Em produção, prefira validate e aplique o script db/manual/alter_status_columns.sql manualmente.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.serialization.write-dates-as-timestamps=false

